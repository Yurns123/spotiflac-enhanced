name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        type: choice
        default: 'unsigned'
        options:
          - unsigned
          - appstore
  push:
    branches: [master]
    paths:
      - 'lib/**'
      - 'go_backend/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'ios/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go_backend/go.sum

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build Go XCFramework
        working-directory: go_backend
        env:
          CGO_ENABLED: 1
        run: |
          go mod download
          go mod tidy
          go build ./...
          mkdir -p ../ios/Frameworks
          gomobile bind -target=ios -o ../ios/Frameworks/Gobackend.xcframework .

      - name: Verify XCFramework
        run: |
          ls -la ios/Frameworks/
          ls -la ios/Frameworks/Gobackend.xcframework/ || (echo "ERROR: XCFramework not found!" && exit 1)

      - name: Add XCFramework to Xcode project
        run: |
          sudo gem install xcodeproj
          cat > add_framework.rb << 'RUBYEOF'
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          frameworks_group = project.main_group.find_subpath('Frameworks', true)
          frameworks_group ||= project.main_group.new_group('Frameworks')
          framework_path = 'Frameworks/Gobackend.xcframework'
          framework_ref = frameworks_group.new_file(framework_path, :project)
          frameworks_build_phase = target.frameworks_build_phase
          frameworks_build_phase.add_file_reference(framework_ref)
          embed_phase = target.build_phases.find { |p| p.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) && p.name == 'Embed Frameworks' }
          if embed_phase
            build_file = embed_phase.add_file_reference(framework_ref)
            build_file.settings = { 'ATTRIBUTES' => ['CodeSignOnCopy', 'RemoveHeadersOnCopy'] }
          end
          project.save
          puts "XCFramework added to Xcode project"
          RUBYEOF
          ruby add_framework.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Runner code
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Fix CRLF in ffmpeg_kit scripts
        run: |
          find "$HOME/.pub-cache/hosted" -path "*ffmpeg_kit_flutter_new_full*/scripts/*.sh" -type f -print0 |
            while IFS= read -r -d '' f; do
              perl -pi -e 's/\r$//' "$f"
              chmod +x "$f"
              echo "Normalized: $f"
            done

      - name: Build iOS (unsigned)
        if: ${{ github.event.inputs.build_type != 'appstore' }}
        run: |
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
          cd ..
          mkdir -p build/ios/ipa/Payload
          cp -R ios/build/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -qr ../../SpotiFLAC-unsigned.ipa Payload/
          cd ../..

      - name: Build iOS (App Store)
        if: ${{ github.event.inputs.build_type == 'appstore' }}
        run: |
          flutter build ipa --release --export-method app-store
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload unsigned IPA
        if: ${{ github.event.inputs.build_type != 'appstore' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpotiFLAC-unsigned-IPA
          path: build/ios/SpotiFLAC-unsigned.ipa
          retention-days: 7

      - name: Upload App Store IPA
        if: ${{ github.event.inputs.build_type == 'appstore' }}
        uses: actions/upload-artifact@v4
        with:
          name: SpotiFLAC-AppStore-IPA
          path: build/ios/ipa/*.ipa
          retention-days: 7

      - name: Build Summary
        run: |
          IPA_SIZE=$(du -h build/ios/SpotiFLAC-unsigned.ipa 2>/dev/null | cut -f1 || echo "N/A")
          echo "### SpotiFLAC Enhanced - iOS Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $IPA_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**Features:** Progressive FLAC streaming, Background preloading, Hybrid mode, Apple Music UI" >> $GITHUB_STEP_SUMMARY
          echo "**Install:** Sideload via SideStore/AltStore (7-day cert)" >> $GITHUB_STEP_SUMMARY
